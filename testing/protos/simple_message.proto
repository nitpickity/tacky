syntax = "proto2";

package example;
// Test message with all simple scalar fields
message SimpleMessage {
    optional int64 normal_int = 1;
    optional sint64 zigzag_int = 2;
    optional sfixed64 fixed_int = 3;
    repeated int32 manynumbers = 4 [packed=true];
    repeated int32 manynumbers_unpacked = 5;
    repeated SimpleEnum packed_enum = 11 [packed = true];
    optional string astring = 6;
    repeated string manystrings = 7;
    repeated bytes manybytes = 8;
    optional bytes abytes = 9;
    optional bool yesno = 10;
    repeated double packed_doubles = 12 [packed=true];
    repeated float packed_floats = 13 [packed=true];
    repeated fixed32 packed_fixed32 = 14 [packed=true];
    repeated fixed64 packed_fixed64 = 15 [packed=true];
    repeated sfixed32 packed_sfixed32 = 16 [packed=true];
    repeated sfixed64 packed_sfixed64 = 17 [packed=true];
    repeated int32 repeated_ints = 18;
    repeated float repeated_floats = 19;
}


// Some maps
message MsgWithMaps {
    map<string,int32> map1 = 1;
    map<sfixed32,double> map2 = 2;
}

// nested message maps
message MapsWithMsg {
    map<string, SimpleMessage> map1 = 1;
}


message MsgWithEnums {
    optional SimpleEnum enum1 = 1;
    repeated AnotherEnum enum2 = 2;
}

message MsgWithNesting {
    optional MsgWithEnums enums = 1;
    repeated SimpleMessage nested = 2;
}

enum SimpleEnum {
    FIRST = 0;
    SECOND = 1;
}

enum AnotherEnum {
    A = 0;
    B = 1;
}

message Level4 {
    optional string data = 1;
    optional int32 num = 2;
}

message Level3 {
    optional Level4 next = 1;
    optional int32 num = 2;
}

message Level2 {
    optional Level3 next = 1;
    optional int32 num = 2;
}

message Level1 {
    optional Level2 next = 1;
    optional int32 num = 2;
}

message BigLevel4 {
    optional string data1 = 1;
    optional string data2 = 2;
    optional int32 num1 = 3;
    optional int32 num2 = 4;
    optional bool flag = 5;
    repeated int32 many_nums = 6;
}

message BigLevel3 {
    optional BigLevel4 next = 1;
    optional string data = 2;
    optional int32 num = 3;
    optional bool flag = 4;
}

message BigLevel2 {
    optional BigLevel3 next = 1;
    optional string data = 2;
    optional int32 num = 3;
    optional bool flag = 4;
}

message BigLevel1 {
    optional BigLevel2 next = 1;
    optional string data = 2;
    optional int32 num = 3;
    optional bool flag = 4;
}

message MixedSmallMessage {
    optional string label = 1;
    optional int32 count = 2;
    optional bool active = 3;
}

message MixedLargeMessage {
    optional string id = 1;
    optional string name = 2;
    optional string description = 3;
    optional int64 timestamp = 4;
    optional double score = 5;
    optional bool is_verified = 6;
    repeated int32 tags = 7 [packed=true];
    repeated string permissions = 8;
    optional MixedSmallMessage details = 9;
    repeated double metrics = 10 [packed=true];
    repeated bool flags = 11 [packed=true];
}

message MixedUsageMessage {
    optional string session_id = 1;
    optional int32 user_id = 2;
    optional string client_version = 3;
    optional MixedSmallMessage small_payload = 4;
    optional MixedLargeMessage large_payload = 5;
    repeated MixedSmallMessage history = 6;
    repeated string related_ids = 7;
    optional int64 created_at = 8;
    optional int64 updated_at = 9;
    optional double priority = 10;
    optional bool is_test = 11;
    optional SimpleEnum status = 12;
}

// Test nested definitions
message Outer {
    enum Status {
        UNKNOWN = 0;
        ACTIVE = 1;
        INACTIVE = 2;
    }
    message Inner {
        optional string value = 1;
        optional int32 num = 2;
    }
    optional Status status = 1;
    optional Inner inner = 2;
    optional string name = 3;
}

message ApiResponse {
    optional string request_id = 1;
    oneof result {
        string error = 2;
        int32 code = 3;
        SimpleMessage data = 4;
    }
    optional bool cached = 5;
}

// Single-field messages for isolated micro-benchmarks.
// Using dedicated messages ensures neither side pays for unrelated field checks.
message PackedInts {
    repeated int32 values = 1 [packed=true];
}
message UnpackedInts {
    repeated int32 values = 1;
}
message RepeatedStrings {
    repeated string values = 1;
}
