name: Benchmarks

on:
  workflow_dispatch:  # manual trigger only, so it doesn't run on every push

jobs:
  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Run benchmarks
        run: cargo bench -p testing 2>&1 | tee bench_output.txt
      - uses: actions/upload-artifact@v4
        with:
          name: bench-results
          path: bench_output.txt
